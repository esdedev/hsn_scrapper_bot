services:
  bot:
    build: .
    command: python -m src.bot
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  scraper:
    build: .
    command: >
      bash -c "
        env | grep -E '^(TELEGRAM_|PATH=|HOME=|LANG=)' | sed 's/=\(.*\)/=\"\1\"/' > /etc/environment &&
        cp /app/cron/scraper-cron /etc/cron.d/scraper-cron &&
        chmod 0644 /etc/cron.d/scraper-cron &&
        crontab /etc/cron.d/scraper-cron &&
        echo 'Cron started. Running initial scrape...' &&
        python main.py &&
        cron -f
      "
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./cron:/app/cron:ro
    restart: unless-stopped
